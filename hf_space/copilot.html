  :root{
    /* Neon — modern dark glass */
    --bg:#07080e; --bg-2:#0b0d16;
    --ink:#eef1fb; --muted:#9aa1bb; --faint:#646b86;
    --cyan:#2ee6d6; --blue:#4d7cff; --violet:#9d5cff; --pink:#ff4d8d; --red:#ff3b5c;
    --grad:linear-gradient(120deg,#2ee6d6 0%,#4d7cff 52%,#9d5cff 100%);
    --grad-cta:linear-gradient(120deg,#2ee6d6 0%,#4d7cff 100%);
    --team:#2ee6d6; --opp:#ff4d6e; --neutral:#7e87a3;
    --assassin:#000000; --assassin-ink:#e6e9f5; --assassin-line:rgba(238,241,255,.72);
    --good:#3ef0b0; --warn:#ffc24d; --bad:#ff5c7a;
    --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.14);
    --panel:rgba(16,18,29,.72); --card-faint:rgba(255,255,255,.045);
    --font:"Assistant","Arial Hebrew",system-ui,-apple-system,"Segoe UI",sans-serif;
    --display:"Rubik","Assistant",system-ui,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --radius:16px;
  }
  *{box-sizing:border-box}
  html,body{margin:0; height:100%}
  body{
    background:
      radial-gradient(58% 48% at 10% -4%, rgba(46,230,214,.12), transparent 60%),
      radial-gradient(52% 46% at 94% 4%, rgba(157,92,255,.14), transparent 60%),
      radial-gradient(70% 60% at 50% 116%, rgba(77,124,255,.12), transparent 62%),
      linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px),
      var(--bg);
    background-size:auto,auto,auto,42px 42px,42px 42px,auto;
    color:var(--ink); font-family:var(--font); line-height:1.5;
    min-height:100vh; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  button{font-family:inherit; cursor:pointer}
  .wrap{max-width:1280px; margin:0 auto; padding:14px 24px 16px; height:100dvh; display:flex; flex-direction:column; overflow:hidden}
  /* editing makes cards taller — let the page grow/scroll then so nothing is clipped */
  .wrap:has(.board.editing){height:auto; min-height:100dvh; overflow:visible}

  /* ---- app bar ---- */
  header.bar{display:flex; align-items:center; gap:18px; flex-wrap:wrap; padding:2px 2px 10px; flex:0 0 auto}
  .brand{display:flex; align-items:baseline; gap:12px}
  .brand h1{font-family:var(--display); font-size:29px; font-weight:900; margin:0; letter-spacing:-.01em;
    color:transparent; background:var(--grad); -webkit-background-clip:text; background-clip:text;
    filter:drop-shadow(0 0 16px rgba(46,230,214,.35))}
  .brand .tag{font-size:13px; color:var(--muted); max-width:42ch; line-height:1.35}
  .spacer{flex:1}

  .seg{display:inline-flex; background:rgba(255,255,255,.04); border:1px solid var(--line);
    border-radius:999px; padding:4px}
  .seg button{border:0; background:transparent; color:var(--muted); padding:9px 18px; border-radius:999px;
    font-size:14px; font-weight:700; letter-spacing:.005em; transition:color .15s}
  .seg button.on{background:var(--grad-cta); color:#04141b; box-shadow:0 0 18px rgba(46,230,214,.4)}
  .seg.sm{padding:3px} .seg.sm button{padding:6px 12px; font-size:13px}
  .riskwrap, .vocabwrap{display:inline-flex; align-items:center; gap:7px}

  .tools{display:flex; align-items:center; gap:9px; flex-wrap:wrap; margin-bottom:10px; flex:0 0 auto}
  select,.btn{
    background:rgba(255,255,255,.045); color:var(--ink); border:1px solid var(--line);
    border-radius:10px; padding:9px 13px; font-size:13.5px; font-weight:600; font-family:inherit;
  }
  .btn:hover,select:hover{border-color:var(--cyan); box-shadow:0 0 14px rgba(46,230,214,.18)}
  .btn.ghost{background:transparent}
  .btn.active{border-color:var(--cyan); color:var(--cyan); background:rgba(46,230,214,.1); box-shadow:0 0 14px rgba(46,230,214,.22)}
  .lbl{font-size:11.5px; color:var(--faint); letter-spacing:.02em}

  /* ---- layout ---- */
  .stage{display:flex; gap:22px; align-items:stretch; flex:1 1 auto; min-height:0}
  .left{flex:0 0 auto; width:min(600px,52%); display:flex; flex-direction:column; gap:9px; min-height:0}
  .right{flex:1 1 380px; min-width:340px; min-height:0; display:flex}
  @media(max-width:920px){ .wrap{height:auto; overflow:visible} .stage{flex-direction:column} .left{display:contents} .right{width:100%} .panel-b{overflow:visible} .mappanel{min-height:240px}
    /* stacked order: board first, assistant (CTA + clue) next, semantic map last */
    .board,#hint,.statusbar{order:0} .right{order:1} .mappanel{order:2; margin-top:0} }
  @media(max-width:560px){
    .wrap{padding:9px 11px 18px}
    header.bar{gap:9px 13px; padding-bottom:7px}
    .brand h1{font-size:20px}
    .brand .tag{display:none}
    .tools{gap:7px; margin-bottom:8px}
    .seg button{padding:8px 13px}
    .board{gap:6px}
    .card{font-size:13px; border-radius:11px; padding:5px 3px}
    .card .cover{width:17px; height:17px; top:5px}
    .card .n{min-width:20px; height:20px; top:-7px}
    .board.editing .card{min-height:74px}
    .mappanel{min-height:190px}
    .panel-b{padding:14px}
    .cluechip{font-size:33px}
    .stepper button{width:44px; height:50px}
    .barrow .nm{flex-basis:78px}
  }
  #pcgate{display:none}
  @media(max-width:760px){
    #pcgate{display:flex; align-items:center; gap:10px;
      padding:8px 12px; background:rgba(16,36,58,.92); border-bottom:1px solid var(--line)}
    body.pcg-in #pcgate{display:none}
    .pcg-ico{font-size:17px; line-height:1; flex:0 0 auto}
    .pcg-msg{flex:1; font-size:12.5px; line-height:1.35; color:var(--muted)}
    #pcg-go{flex:0 0 auto; width:26px; height:26px; padding:0; border:1px solid var(--line);
      background:rgba(255,255,255,.05); color:var(--muted); border-radius:8px; font-size:17px;
      line-height:1; cursor:pointer; transition:border-color .15s, color .15s}
    #pcg-go:hover{border-color:var(--cyan); color:var(--ink)}
  }

  /* ---- board ---- */
  .board{display:grid; grid-template-columns:repeat(5,1fr); gap:9px; flex:0 0 auto}
  .card{
    position:relative; aspect-ratio:5/2.8; border-radius:14px;
    background:linear-gradient(160deg,var(--card-faint),rgba(255,255,255,.012)); color:var(--ink);
    border:1px solid var(--line);
    display:flex; align-items:center; justify-content:center; text-align:center;
    font-family:var(--display); font-weight:600; font-size:18px; padding:6px 5px; user-select:none;
    box-shadow:0 6px 18px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
    transition:transform .12s, box-shadow .18s, border-color .18s;
    animation:deal .34s cubic-bezier(.2,.8,.25,1) both;
  }
  @keyframes deal{from{opacity:0; transform:translateY(10px) scale(.97)} to{opacity:1; transform:none}}
  @media(prefers-reduced-motion){.card{animation:none}}
  .card .w{pointer-events:none; word-break:break-word; line-height:1.15; letter-spacing:.005em}
  .card input{
    width:100%; text-align:center; font-family:var(--display); font-weight:600; font-size:16px;
    background:rgba(0,0,0,.35); color:var(--ink); border:1px solid var(--line-2);
    border-radius:8px; padding:6px 2px;
  }
  /* spymaster role tints — neon */
  .card.r-my{border-color:rgba(46,230,214,.6); color:#d6fff9;
    background:linear-gradient(160deg,rgba(46,230,214,.16),rgba(46,230,214,.03));
    box-shadow:0 6px 18px rgba(0,0,0,.45),0 0 16px rgba(46,230,214,.16),inset 0 0 18px rgba(46,230,214,.07)}
  .card.r-opp{border-color:rgba(255,77,110,.55); color:#ffd6df;
    background:linear-gradient(160deg,rgba(255,77,110,.15),rgba(255,77,110,.03));
    box-shadow:0 6px 18px rgba(0,0,0,.45),0 0 16px rgba(255,77,110,.14),inset 0 0 18px rgba(255,77,110,.06)}
  .card.r-neutral{border-color:rgba(126,135,163,.45); color:#cdd3e4;
    background:linear-gradient(160deg,rgba(126,135,163,.13),rgba(126,135,163,.02))}
  .card.r-assassin{border-color:var(--assassin-line); color:var(--assassin-ink);
    background:radial-gradient(125% 120% at 50% 28%, #101019 0%, #000 88%);
    box-shadow:0 6px 20px rgba(0,0,0,.85), 0 0 16px rgba(220,226,255,.12),
      inset 0 0 0 1px rgba(238,241,255,.16), inset 0 16px 30px rgba(0,0,0,.6)}
  /* states */
  .card.clickable{cursor:pointer}
  .card.clickable:hover{transform:translateY(-2px); border-color:var(--cyan)}
  .card.focus{border-color:#5ffff0; transform:translateY(-3px);
    box-shadow:0 0 0 2px #5ffff0, 0 0 30px rgba(46,230,214,.65), 0 0 70px rgba(46,230,214,.32),
      inset 0 0 24px rgba(46,230,214,.18)}
  .card.intended{border-color:var(--good);
    box-shadow:0 0 0 2px var(--good),0 0 28px rgba(62,240,176,.55),inset 0 0 20px rgba(62,240,176,.14)}
  .card.danger{border-color:var(--bad);
    box-shadow:0 0 0 2px var(--bad),0 0 28px rgba(255,92,122,.5),inset 0 0 20px rgba(255,92,122,.12)}
  .card.revealed{opacity:.6; filter:saturate(.7)}
  .card.revealed .w{opacity:.7}
  .card .cover{position:absolute; top:6px; inset-inline-start:7px; width:20px; height:20px; border-radius:50%;
    display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:800;
    background:rgba(0,0,0,.45); color:var(--cyan); box-shadow:0 0 10px rgba(46,230,214,.4)}
  .card .badge{
    position:absolute; top:-9px; inset-inline-end:-9px; min-width:24px; height:24px; padding:0 6px;
    border-radius:12px; background:var(--grad-cta); color:#04141b; font-size:12.5px; font-weight:800;
    display:flex; align-items:center; justify-content:center; font-family:var(--font);
    box-shadow:0 0 16px rgba(46,230,214,.55),0 2px 6px rgba(0,0,0,.5)}
  .card .conf{position:absolute; bottom:0; inset-inline-start:0; height:4px; background:var(--grad-cta); border-radius:0 0 0 13px; opacity:.95; box-shadow:0 0 10px rgba(46,230,214,.5)}
  /* edit-mode role picker */
  .board.editing .card{aspect-ratio:auto; min-height:86px; flex-direction:column; gap:7px; justify-content:center}
  .roleset{display:flex; gap:7px; justify-content:center}
  .rs{width:18px; height:18px; border-radius:50%; border:1.5px solid rgba(255,255,255,.3); padding:0; cursor:pointer; transition:transform .1s}
  .rs:hover{transform:scale(1.15)}
  .rs.r-my{background:var(--team)} .rs.r-opp{background:var(--opp)}
  .rs.r-neutral{background:var(--neutral)} .rs.r-assassin{background:#050507; border-color:var(--assassin-line)}

  /* clue reveal */

  .chip.good{color:#9bffd9; border-color:rgba(62,240,176,.45); background:rgba(62,240,176,.1)}
  .chip.bad{color:#ffb3c0; border-color:rgba(255,92,122,.4); background:rgba(255,92,122,.1)}

  .bars{display:flex; flex-direction:column; gap:7px}

  .barrow .track{flex:1; height:9px; background:rgba(255,255,255,.08); border-radius:5px; overflow:hidden}

  details.short{margin-top:16px; border-top:1px solid var(--line); padding-top:13px}

  .cand{display:flex; align-items:center; gap:10px; padding:7px 8px; border-radius:8px; font-size:13px; cursor:pointer}

  .verdict.warn{background:rgba(255,194,77,.1); border:1px solid rgba(255,194,77,.4); color:#ffd98a}
  .verdict.bad{background:rgba(255,92,122,.1); border:1px solid rgba(255,92,122,.4); color:#ffb3c0}

  .pick .num{flex:0 0 28px; height:28px; border-radius:50%; background:var(--grad-cta); color:#04141b; font-weight:800; display:flex; align-items:center; justify-content:center; box-shadow:0 0 14px rgba(46,230,214,.45)}
  .pick .pw{font-family:var(--display); font-weight:700; font-size:16px; flex:0 0 auto}
  .pick .track{flex:1; height:8px; background:rgba(255,255,255,.08); border-radius:5px; overflow:hidden}
  .pick .fill{height:100%; background:var(--grad-cta); box-shadow:0 0 10px rgba(46,230,214,.4)}
  .pick .pct{font-family:var(--mono); font-size:12px; color:var(--muted); flex:0 0 38px; text-align:end; font-variant-numeric:tabular-nums}
  .note{font-size:12.5px; color:var(--muted); margin-top:13px; line-height:1.55}

  .spin{display:inline-block; width:14px; height:14px; border:2px solid rgba(4,20,27,.3); border-top-color:#04141b; border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px; margin-inline-end:7px}
  @keyframes sp{to{transform:rotate(360deg)}}
  a.link{color:var(--cyan); text-decoration:none}
</style>
</head>
<body>
<div id="pcgate">
  <span class="pcg-ico">💻</span>
  <span class="pcg-msg">החוויה המלאה (מפת המשמעויות, לוח רחב) הכי טובה במסך מחשב — אבל אפשר גם כאן.</span>
  <button id="pcg-go" type="button" aria-label="סגור">×</button>
</div>
<div class="wrap">
  <header class="bar">
    <div class="brand">
      <h1>קופיילוט · שם קוד</h1>
      <span class="tag">העוזר החכם שלך — לרב המרגלים ולמנחש · מקומי, מיידי, ללא ענן</span>
    </div>
    <div class="spacer"></div>
    <div class="seg" id="mode">
      <button data-mode="spymaster" class="on">אני רב המרגלים</button>
      <button data-mode="operative">אני המנחש</button>
    </div>
  </header>

  <div class="tools">
    <span class="lbl">לוח:</span>
    <button class="btn" id="deal">🎲 לוח חדש</button>
    <button class="btn ghost" id="swap" title="בחר לאיזה צד אתה נותן רמזים — צבעי הקלפים לא משתנים, רק הקלפים שאפשר ללחוץ עליהם">🔄 נותן רמז לתכלת</button>
    <button class="btn ghost" id="edit">✏️ ערוך</button>
    <button class="btn ghost" id="reveal">🃏 חשיפה</button>
    <button class="btn ghost" id="clearsel" title="נקה את היעדים שבחרת">✕ נקה בחירה</button>
    <span class="riskwrap" id="riskwrap" title="כמה להסתכן ברמז: זהיר = רק רמזים בטוחים לחלוטין · נועז = מכסה יותר מילים וסובל קרבה ליריב">
      <span class="lbl">סיכון:</span>
      <span class="seg sm" id="risk">
        <button data-risk="cautious">זהיר</button>
        <button data-risk="balanced" class="on">מאוזן</button>
        <button data-risk="bold">נועז</button>
      </span>
    </span>
    <span class="vocabwrap" id="vocabwrap" title="מצב אוצר מילים לרמז: שמרני = שמות עצם ותארים נפוצים · רחב = כולל שמות פרטיים ומקומות · ניסיוני = כולל גם פעלים וטווח רחב יותר">
      <span class="lbl">אוצר מילים:</span>
      <span class="seg sm" id="vocab">
        <button data-vocab="conservative" class="on">שמרני</button>
        <button data-vocab="broad">רחב</button>
        <button data-vocab="experimental">ניסיוני</button>
      </span>
    </span>
    <span style="flex:1"></span>
    <span class="lbl engtag">גאומטריה · fastText · ללא LLM</span>

  </div>

  <div class="stage">

      <div class="mappanel">
        <div class="map-h"><b>המרחב הסמנטי</b><span class="map-cap">הרמז יושב במרכז המילים שלך</span></div>
        <canvas id="space"></canvas>
      </div>

      </div>
    </div>
  </div>
</div>

<script>
"use strict";
const $ = s => document.querySelector(s);
async function api(p,b){
  try{
    const res = await fetch(p,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(b)});
    const txt = await res.text();
    try{ return JSON.parse(txt); }
    catch{ return {error:`תשובת שרת לא תקינה (${res.status})`}; }
  }catch(e){ return {error:`אין חיבור לשרת — ודא ש-app.py רץ (${e.message})`}; }
}
const getJSON = p => fetch(p).then(r=>r.json());
const esc = s => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const ROLE_HE = {my:"הצוות שלי", opp:"היריב", neutral:"ניטרלי", assassin:"מתנקש"};
// the side currently being coached, in the spymaster panel's voice ("your team", colored by board)
const sideTxt = () => "הצוות שלך (" + (S.side==="opp"?"אדום":"תכלת") + ")";

const S = {
  mode:"spymaster", side:"my", words:[], roles:{}, editing:false, revealMode:false,
  focus:new Set(), revealed:new Set(),
  engine:{spymaster:"geometry", operative:"geometry"}, model:null, risk:"balanced", vocab_mode:"conservative",
  spyTab:"generate",
  spyResult:null, spyIdx:0, checkResult:null, opResult:null,
  opClue:"", opCount:2, checkClue:"",
  space:null, spaceLinks:[],
  busy:false, health:null, error:""
};

const ENGINES = {
  spymaster:[ {v:"geometry", t:"גאומטריה · fastText", llm:false} ],
  operative:[ {v:"geometry", t:"גאומטריה · fastText", llm:false} ]
};

// ---------- boot ----------
async function boot(){
  try{ S.health = await getJSON("/api/health"); S.model = S.health.models?.[0]?.id || null; }
  catch(e){ S.health=null; }
  try{ await document.fonts.ready; }catch(e){}
  await deal();
}
async function deal(){
  S.error="";
  try{
    const d = await getJSON("/api/deal");
    S.words = d.words; S.roles = d.roles;
  }catch(e){
    // fallback demo board if server isn't up
    S.words = ["מלך","חרב","טירה","דרקון","נסיכה","יער","נהר","הר","ים","שמש","ירח","כוכב","אש","קרח","רוח","אבן","זהב","כסף","ברזל","עץ","פרח","ציפור","דג","סוס","חתול"];
    const r=["my","my","my","my","my","my","my","my","my","opp","opp","opp","opp","opp","opp","opp","opp","neutral","neutral","neutral","neutral","neutral","neutral","neutral","assassin"];
    S.roles = Object.fromEntries(S.words.map((w,i)=>[w,r[i]]));
  }
  S.focus.clear(); S.revealed.clear(); S.revealMode=false; S.side="my";
  S.spyResult=S.checkResult=S.opResult=null; S.spyIdx=0;
  S.space=null; S.spaceLinks=[];
  render(); drawSpace();
}

// current spymaster option (the one being shown; the "next" button cycles S.spyIdx)
function curOpt(){ const r=S.spyResult; if(!r) return null; return r.options? r.options[S.spyIdx] : r; }
// board minus already-revealed cards: revealed words leave the analysis and become legal clues again.
// roles are returned from the active side's perspective — when coaching the opponent (S.side==="opp"),
// my↔opp are swapped for the engine, while the board's display colors (S.roles) stay fixed.
function activeBoard(){
  const words=S.words.filter(w=>!S.revealed.has(w));
  const sw={my:"opp",opp:"my"};
  const roles={}; words.forEach(w=>{ const r=S.roles[w]; roles[w]=(S.side==="opp"&&sw[r])?sw[r]:r; });
  return {words, roles};
}

// ---------- board ----------
function cardClass(w){
  let c="card";
  const revealed=S.revealed.has(w);
  // revealed cards show their true role in both seats (it's known now)
  if(S.mode==="spymaster" || revealed) c+=" r-"+S.roles[w];
  if(revealed){ return c+" revealed"; }
  if(S.revealMode) c+=" clickable";
  else if(S.mode==="spymaster" && !S.editing && S.spyTab==="generate" && S.roles[w]===S.side) c+=" clickable";
  if(S.focus.has(w)) c+=" focus";
  const cur=curOpt(), cr=S.checkResult;
  if(S.mode==="spymaster"){
    if(S.spyTab==="generate" && cur && !cur.no_clue){
      if(cur.intended?.includes(w)) c+=" intended";
      else if((cur.leak||[]).slice(0,3).some(x=>x.word===w)) c+=" danger";
    }
    if(S.spyTab==="check" && cr){
      if(cr.first_danger && cr.first_danger.word===w) c+=" danger";
    }
  }
  return c;
}
const ROLE_KEYS = ["my","opp","neutral","assassin"];
function renderBoard(){
  const b=$("#board"); b.innerHTML="";
  b.classList.toggle("editing", S.editing);
  S.words.forEach((w,i)=>{
    const el=document.createElement("div");
    el.className=cardClass(w);
    el.dataset.w=w;
    el.style.animationDelay=(i*14)+"ms";
    let inner="";
    // operative pick badge
    if(S.mode==="operative" && S.opResult){
      const pi=S.opResult.picks.indexOf(w);
      if(pi>=0) inner+=`<span class="badge">${pi+1}</span>`;
      const rr=S.opResult.ranking.find(r=>r.word===w);
      if(rr) inner+=`<span class="conf" style="width:${Math.round(rr.conf*100)}%"></span>`;
    }
    if(S.revealed.has(w)) inner+=`<span class="cover">✓</span>`;
    if(S.editing && !S.revealed.has(w)){
      if(S.mode==="spymaster")               // explicit role picker — choose the card's color
        inner+=`<div class="roleset">`+ROLE_KEYS.map(r=>`<button class="rs r-${r} ${S.roles[w]===r?"on":""}" data-act="setrole" data-w="${esc(w)}" data-r="${r}" title="${ROLE_HE[r]}"></button>`).join("")+`</div>`;
      inner+=`<input value="${esc(w)}" data-act="word" data-i="${i}" />`;
    } else inner+=`<span class="w">${esc(w)}</span>`;
    el.innerHTML=inner;
    b.appendChild(el);
  });
}

// ---------- latent-space map ----------
const MAPCOL = {my:"#2ee6d6", opp:"#ff5c7a", neutral:"#9aa1bb", assassin:"#0c0c14"};
const ASS_INK = "#d8dcec";   // light accent for the (black) assassin on the dark map
async function showSpace(clue, links){
  const ab=activeBoard();
  S.spaceLinks = (links||[]).filter(w=>ab.words.includes(w));
  const roles={}; ab.words.forEach(w=>roles[w]=S.roles[w]);   // map keeps the board's fixed display colors
  const r = await api("/api/space",{words:ab.words,roles:roles,clue:clue});
  S.space = r.error ? null : r;
  drawSpace();
}
function drawSpace(){
  const cv=$("#space"); if(!cv) return;
  const cssW = cv.clientWidth || cv.parentElement.clientWidth || 560;
  const cssH = cv.clientHeight || Math.round(cssW*0.55);   // fill the flex slot left in the column
  const dpr = window.devicePixelRatio||1;
  cv.width=Math.round(cssW*dpr); cv.height=Math.round(cssH*dpr);
  const ctx=cv.getContext("2d"); ctx.setTransform(dpr,0,0,dpr,0,0);

  // dark background + faint vignette
  let bg=ctx.createRadialGradient(cssW*.5,cssH*.34,30,cssW*.5,cssH*.5,cssH*1.1);
  bg.addColorStop(0,"#10131f"); bg.addColorStop(1,"#06070d");
  ctx.fillStyle=bg; ctx.fillRect(0,0,cssW,cssH);

  if(!S.space || !S.space.coords){
    ctx.fillStyle="#5b6485"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.font="500 15px 'Rubik',sans-serif";
    ctx.fillText("צרו רמז כדי לראות את מפת המשמעויות", cssW/2, cssH/2);
    return;
  }

  const pad=Math.max(20, Math.min(40, cssH*0.10)), cx=cssW/2, cy=cssH/2;
  const s=Math.min(cssW-2*pad, cssH-2*pad)/2;
  const X=x=>cx+x*s, Y=y=>cy-y*s;
  const co=S.space.coords, roles=S.space.roles||S.roles, clueXY=S.space.clue_xy;

  // neon links: clue -> target words
  if(clueXY && S.spaceLinks.length){
    const cxp=X(clueXY[0]), cyp=Y(clueXY[1]);
    S.spaceLinks.forEach(w=>{
      if(!co[w]) return;
      const xp=X(co[w][0]), yp=Y(co[w][1]);
      ctx.strokeStyle="rgba(46,230,214,.14)"; ctx.lineWidth=7; ctx.beginPath();
      ctx.moveTo(cxp,cyp); ctx.lineTo(xp,yp); ctx.stroke();
      ctx.strokeStyle="rgba(120,245,232,.85)"; ctx.lineWidth=1.5; ctx.beginPath();
      ctx.moveTo(cxp,cyp); ctx.lineTo(xp,yp); ctx.stroke();
    });
  }

  // points: label only the clue's targets + the assassin; the rest stay as dim dots so the small map reads clean
  ctx.textAlign="center"; ctx.textBaseline="middle";
  ctx.font="600 15px 'Rubik',sans-serif";
  const known = w => S.mode!=="operative" || S.revealed.has(w);   // the guesser doesn't know roles
  const labelSet=new Set(S.spaceLinks);
  Object.keys(co).forEach(w=>{ if(known(w) && (roles[w]||"")==="assassin") labelSet.add(w); });
  Object.keys(co).forEach(w=>{
    const xp=X(co[w][0]), yp=Y(co[w][1]);
    const role=known(w)?(roles[w]||"neutral"):"neutral", ass=role==="assassin";
    const col=MAPCOL[role]||"#9aa1bb", ink=ass?ASS_INK:col, big=labelSet.has(w);
    ctx.globalAlpha=big?1:0.5;
    ctx.beginPath(); ctx.arc(xp,yp,big?4.2:3,0,7); ctx.fillStyle=col; ctx.fill();
    if(ass){ ctx.globalAlpha=1; ctx.lineWidth=1.3; ctx.strokeStyle=ASS_INK; ctx.stroke(); }  // ring so the black card reads
    ctx.globalAlpha=1;
    if(big){
      ctx.lineJoin="round"; ctx.lineWidth=3.6; ctx.strokeStyle="rgba(4,8,16,.92)";
      ctx.strokeText(w, xp, yp-13);
      ctx.fillStyle=ink; ctx.fillText(w, xp, yp-13);
    }
  });

  // clue node — neon glow
  if(clueXY){
    const xp=X(clueXY[0]), yp=Y(clueXY[1]);
    let g=ctx.createRadialGradient(xp,yp,0,xp,yp,38);
    g.addColorStop(0,"rgba(46,230,214,.5)"); g.addColorStop(.6,"rgba(77,124,255,.22)"); g.addColorStop(1,"rgba(46,230,214,0)");
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(xp,yp,38,0,7); ctx.fill();
    let core=ctx.createLinearGradient(xp-8,yp-8,xp+8,yp+8);
    core.addColorStop(0,"#7df5e8"); core.addColorStop(1,"#4d7cff");
    ctx.fillStyle=core; ctx.beginPath(); ctx.arc(xp,yp,7,0,7); ctx.fill();
    ctx.lineWidth=1.5; ctx.strokeStyle="rgba(230,255,252,.9)"; ctx.stroke();
    ctx.font="900 22px 'Rubik',sans-serif";
    ctx.lineJoin="round"; ctx.lineWidth=4.5; ctx.strokeStyle="rgba(4,8,16,.95)";
    ctx.strokeText(S.space.clue, xp, yp-21);
    ctx.fillStyle="#9ffaef"; ctx.fillText(S.space.clue, xp, yp-21);
  }
}

// ---------- briefing ----------
function bars(read, top){
  const sw={my:"opp",opp:"my"};
  const rows=read.slice(0,top).map(r=>{
    const pct=Math.round(r.conf*100);
    const tag = r.role==="my"?"✓":(r.role==="assassin"?"מתנקש":(r.role==="opp"?"יריב":""));
    const disp = (S.side==="opp" && sw[r.role]) ? sw[r.role] : r.role;   // fill follows the board's fixed colors
    return `<div class="barrow role-${disp}"><span class="nm">${esc(r.word)}</span>
      <span class="track"><span class="fill" style="width:${pct}%"></span></span>
      <span class="tag">${tag}</span><span class="pct">${pct}</span></div>`;
  }).join("");
  return `<div class="bars">${rows}</div>`;
}
function optNav(r){
  const n = r.options ? r.options.length : 1;
  if(n<2) return "";
  return `<div class="optnav"><button class="optbtn" id="optNext">↻ אפשרות אחרת</button>
    <span class="optpos">${S.spyIdx+1} / ${n}</span></div>`;
}

function renderSpymaster(){
  let h = `<div class="subseg" id="spytabs">
      <button data-tab="generate" class="${S.spyTab==="generate"?"on":""}">תן לי רמז</button>
      <button data-tab="check" class="${S.spyTab==="check"?"on":""}">בדוק רמז שלי</button>
    </div>`;

  if(S.spyTab==="generate"){
    const fc=S.focus.size;
    h += `<button class="cta" id="gen" ${S.busy?"disabled":""}>${S.busy?'<span class="spin"></span>חושב…':(fc?`רמז ל-${fc} המילים שבחרתי`:"תן לי את הרמז הטוב ביותר")}</button>`;
    h += `<div class="note">בחר/י מילים מ${sideTxt()} כדי לכוון את הרמז, או השאר ריק והעוזר יבחר את הקבוצה הטובה ביותר בעצמו.</div>`;
    if(S.error) h+=`<div class="err" style="margin-top:12px">${esc(S.error)}</div>`;
    const r=S.spyResult, cur=curOpt();
    if(cur && !S.busy && cur.no_clue){
      h += `<div class="result">
        <div class="noclue"><span class="big">🤔</span><div>
          <b>אין רמז טוב כרגע</b>
          <div class="noclue-note">${esc(cur.note||("לא נמצאה מילה אחת שמקשרת בבטחה בין מילות "+sideTxt()+"."))}</div>
          ${cur.word?`<div class="noclue-try">הכי קרוב שניסיתי: <em>${esc(cur.word)}</em> — אבל לא מספיק בטוח.</div>`:""}
        </div></div>`;
      h += optNav(r);
      h += `<div class="sec"><h4>איך הלוח נראה לרמז שניסיתי</h4>${bars(cur.read,8)}</div></div>`;
    } else if(cur && !S.busy){
      h += `<div class="result">
        <div class="clueline"><span class="cluechip">${esc(cur.word)}<span class="n">${cur.count}</span></span></div>`;
      h += optNav(r);
      if(cur.risky && cur.note) h+=`<div class="riskbar">${esc(cur.note)}</div>`;
      if(cur.reason) h+=`<div class="reason">💬 ${esc(cur.reason)}</div>`;
      h += `<div class="fb" id="fb"><span>הרמז עזר?</span><button class="fb-b" data-fb="up" title="רמז טוב">👍</button><button class="fb-b" data-fb="down" title="רמז גרוע">👎</button></div>`;
      h += `<div class="fbtxt" id="fbtxt"><input id="fbtext" placeholder="ספרו לנו עוד (לא חובה)…" maxlength="500"><button id="fbsend" type="button">שלח</button></div>`;
      h += `<div class="sec"><h4>מקשר את</h4><div class="chips">${(cur.intended||[]).map(w=>`<span class="chip good">${esc(w)}</span>`).join("")}</div></div>`;
      const akill=cur.assassin&&cur.assassin.word;
      const avoid=(akill?[`<span class="chip kill">${esc(akill)}</span>`]:[]).concat((cur.leak||[]).filter(x=>x.word!==akill).slice(0,4).map(x=>`<span class="chip bad">${esc(x.word)}</span>`));
      h += `<div class="sec"><h4>נמנע מ־</h4><div class="chips">${avoid.length?avoid.join(""):'<span class="chip">—</span>'}</div></div>`;
      h += `<div class="sec"><h4>איך מנחש יקרא את הרמז</h4>${bars(cur.read,8)}</div>`;
      if(r.shortlist && r.shortlist.length){
        h += `<details class="short"><summary>המועמדים של הגאומטריה (${r.shortlist.length})</summary>`;
        h += r.shortlist.map((c,i)=>`<div class="cand ${i===S.spyIdx?"picked":""}" data-act="opt" data-i="${i}">
            <span class="rk">${i+1}</span><span class="cw">${esc(c.word)} ${i===S.spyIdx?'<span class="star">★</span>':''}</span>
            <span class="ci">${esc((c.intended||[]).join(" · "))}</span><span class="sc">${c.score.toFixed(2)}</span></div>`).join("");
        h += `</details>`;
      }
      h += `</div>`;
    } else if(!cur && !S.busy && !S.error){
      h += emptyState("🎯","בחר/י מילים של "+sideTxt()+" בלוח ולחץ — אקבל לך רמז, ואראה לך בדיוק על מה הוא מצביע ומה הוא מסכן.");
    }
  } else { // check tab
    h += `<div class="row"><div class="field"><label>הרמז שאתה שוקל</label>
        <input id="checkClue" value="${esc(S.checkClue)}" placeholder="הקלד מילה אחת" /></div>
        <button class="cta" style="flex:0 0 110px" id="chk" ${S.busy?"disabled":""}>${S.busy?'<span class="spin"></span>':"בדוק"}</button></div>`;
    const r=S.checkResult;
    if(r && !S.busy){
      let cls="bad", big="✗", txt;
      if(r.illegal){ cls="bad"; big="🚫"; txt="רמז לא חוקי — חופף למילה על הלוח."; }
      else if(r.safe>=2){ cls="ok"; big="✓"; txt=`בטוח: ${r.safe} ממילות ${sideTxt()} מובילות לפני כל מילה אחרת.`; }
      else if(r.safe===1){ cls="warn"; big="⚠"; txt="זהירות: רק מילה אחת בטוחה לפני מילה זרה."; }
      else { cls="bad"; big="✗"; txt="מסוכן: מילה זרה מובילה לפני מילות "+sideTxt()+"."; }
      h += `<div class="result"><div class="verdict ${cls}"><span class="big">${big}</span><span>${esc(txt)}</span></div>`;
      if(r.first_danger) h+=`<div class="sec"><h4>המכשול הראשון</h4><div class="chips"><span class="chip ${r.first_danger.role==='assassin'?'kill':'bad'}">${esc(r.first_danger.word)} · ${ROLE_HE[r.first_danger.role]}</span></div></div>`;
      h += `<div class="sec"><h4>דירוג הלוח לפי הרמז</h4>${bars(r.read,8)}</div></div>`;
    } else if(!S.busy){
      h += emptyState("🔍","חושב על רמז? הקלד אותו ואראה כמה מילים שלך הוא תופס לפני שהוא נכנס לצרות — ואם הוא קרוב מדי למתנקש.");
    }
  }
  return h;
}

function renderOperative(){
  let h = `<div class="row"><div class="field"><label>הרמז שקיבלת</label>
      <input id="opClue" value="${esc(S.opClue)}" placeholder="המילה שהרב מרגלים אמר" /></div>
      <div class="field" style="flex:0 0 120px"><label>מספר</label>
        <div class="stepper"><button data-act="cnt" data-d="-1">−</button><b>${S.opCount}</b><button data-act="cnt" data-d="1">+</button></div></div>
    </div>`;
  h += `<button class="cta" id="guess" ${S.busy?"disabled":""}>${S.busy?'<span class="spin"></span>חושב…':"מה כדאי לנחש?"}</button>`;
  if(S.error) h+=`<div class="err" style="margin-top:12px">${esc(S.error)}</div>`;
  const r=S.opResult;
  if(r && !S.busy){
    h += `<div class="result"><div class="sec"><h4>ההמלצות שלי</h4><div class="picks">`;
    r.picks.forEach((w,i)=>{
      const rr=r.ranking.find(x=>x.word===w); const pct=Math.round((rr?.conf||0)*100);
      h += `<div class="pick"><span class="num">${i+1}</span><span class="pw">${esc(w)}</span>
        <span class="track"><span class="fill" style="width:${pct}%"></span></span><span class="pct">${pct}</span></div>`;
    });
    h += `</div>`;
    if(r.agreement!=null && r.agree_with){
      const who = r.engine==="llm" ? `DictaLM ${r.agree_with==="גאומטריה"?"והגאומטריה":""}` : `שני מודלים עצמאיים (fastText · ${r.agree_with})`;
      h += `<div class="note">${who} מסכימים על <b>${r.agreement}/${r.count}</b> מההמלצות.${r.agreement<r.count?" אי-הסכמה = איתות לזהירות.":""}</div>`;
    }
    h += `<div class="sec"><h4>הדירוג המלא</h4>${bars(r.ranking.map(x=>({word:x.word,role:(S.revealed.has(x.word)?S.roles[x.word]:"unknown"),conf:x.conf})),10)}</div>`;
    h += `</div>`;
  } else if(!S.busy && !S.error){
    h += emptyState("🧭","הקלד/י את הרמז ואת המספר — אדרג לך את כל הקלפים ואסמן את הניחושים הבטוחים לפי הסדר.");
  }
  return h;
}
function emptyState(icon,txt){ return `<div class="empty"><span class="big">${icon}</span>${esc(txt)}</div>`; }

  // panel
  $("#panelTitle").textContent = S.mode==="spymaster"?"תדריך · רב מרגלים":"תדריך · מנחש";
  $("#panelSub").textContent = S.health? (ENGINES[S.mode].find(e=>e.v===S.engine[S.mode])?.t||"") : "מצב הדגמה — הרץ app.py";
  $("#brief").innerHTML = S.mode==="spymaster"?renderSpymaster():renderOperative();
}

// ---------- actions ----------
function uid(){
  try{ let u=localStorage.getItem("cn_uid");
    if(!u){ u=(window.crypto&&crypto.randomUUID)?crypto.randomUUID():(Date.now().toString(36)+Math.random().toString(36).slice(2)); localStorage.setItem("cn_uid",u); }
    return u;
  }catch(_){ return "anon"; }
}
function showFbReasons(){
  const fb=$("#fb"); if(!fb) return;
  fb.innerHTML='<span>למה לא טוב?</span>'+
    '<button class="fb-b fb-w" data-why="vague">מעורפל</button>'+
    '<button class="fb-b fb-w" data-why="link">קשר חלש</button>'+
    '<button class="fb-b fb-w" data-why="risky">מסוכן</button>'+
    '<button class="fb-b fb-w" data-why="overreach">יותר מדי מילים</button>'+
    '<button class="fb-b fb-w" data-why="other">אחר</button>';
}
async function sendFeedback(verdict, why){
  const cur=curOpt();
  const ta=$("#fbtext"); const comment=ta?ta.value.trim():"";
  if(verdict==="note" && !comment){ if(ta) ta.focus(); return; }
  try{ await api("/api/feedback",{
    verdict, why:why||"", comment, uid:uid(),
    mode:S.mode, risk:S.risk, side:S.side,
    clue:cur&&cur.word, count:cur&&cur.count, intended:cur&&cur.intended,
    focus:[...S.focus],
    board:{words:[...S.words], roles:{...S.roles}}, revealed:[...S.revealed],
    option:cur}); }catch(e){}
  const fb=$("#fb"); if(fb) fb.innerHTML='<span>תודה על המשוב! 🙏</span>';
  const tw=$("#fbtxt"); if(tw) tw.remove();
}
async function genClue(){
  S.busy=true; S.error=""; render();
  try{
    const ab=activeBoard();
    const r = await api("/api/coach/spymaster",{words:ab.words,roles:ab.roles,engine:S.engine.spymaster,model:S.model,focus:[...S.focus],risk:S.risk,vocab_mode:S.vocab_mode});
    if(r.error){ S.error=r.error; S.spyResult=null; }
    else { S.spyResult=r; S.spyIdx=r.picked||0; const cur=curOpt(); await showSpace(cur.word, cur.no_clue?[]:cur.intended); }
  }finally{ S.busy=false; render();
    if(S.spyResult && window.matchMedia("(max-width:920px)").matches){
      const el=$("#brief .result")||$(".panel"); if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
    }
  }
}
async function nextOpt(){
  const r=S.spyResult; if(!r||!r.options||r.options.length<2) return;
  S.spyIdx=(S.spyIdx+1)%r.options.length; render();
  const cur=curOpt(); await showSpace(cur.word, cur.no_clue?[]:cur.intended);
}
async function pickOpt(i){
  const r=S.spyResult; if(!r||!r.options||!r.options[i]) return;
  S.spyIdx=i; render();
  const cur=curOpt(); await showSpace(cur.word, cur.no_clue?[]:cur.intended);
}
async function checkClue(){
  const v=$("#checkClue")?.value.trim(); if(!v) return;
  S.checkClue=v; S.busy=true; S.error=""; render();
  try{
    const ab=activeBoard();
    const r = await api("/api/coach/check",{words:ab.words,roles:ab.roles,clue:v});
    if(r.error){ S.error=r.error; S.checkResult=null; }
    else { S.checkResult=r; await showSpace(v, (r.read||[]).slice(0, r.safe).map(x=>x.word)); }
  }finally{ S.busy=false; render(); }
}
async function guess(){
  const v=$("#opClue")?.value.trim(); if(!v){ S.error="הקלד/י רמז."; render(); return; }
  S.opClue=v; S.busy=true; S.error=""; render();
  try{
    const ab=activeBoard();
    const r = await api("/api/coach/operative",{words:ab.words,clue:v,count:S.opCount,engine:S.engine.operative,model:S.model});
    if(r.error){ S.error=r.error; }
    else { S.opResult=r; await showSpace(v, r.picks); }
  }finally{ S.busy=false; render(); }
}

// ---------- events ----------
document.addEventListener("click", e=>{
  const t=e.target;
  if(t.closest("#mode button")){ S.mode=t.closest("button").dataset.mode; S.error=""; S.space=null; S.spaceLinks=[]; render(); drawSpace(); return; }
  const rb=t.closest("#risk button"); if(rb){ S.risk=rb.dataset.risk;
    if(S.words.length && !S.editing){ genClue(); } else { render(); } return; }
  const vb=t.closest("#vocab button"); if(vb){ S.vocab_mode=vb.dataset.vocab;
    if(S.words.length && !S.editing){ genClue(); } else { render(); } return; }
  if(t.id==="pcg-go"){ document.body.classList.add("pcg-in"); try{ sessionStorage.setItem("pcg","1"); }catch(_){}; drawSpace(); return; }
  if(t.id==="clearsel"){ S.focus.clear(); S.spyResult=null; S.spyIdx=0; S.space=null; S.spaceLinks=[]; render(); drawSpace(); return; }
  const fbb=t.closest("[data-fb]"); if(fbb){ if(fbb.dataset.fb==="up") sendFeedback("up"); else showFbReasons(); return; }
  const wb=t.closest("[data-why]"); if(wb){ sendFeedback("down", wb.dataset.why); return; }
  if(t.closest("#fbsend")){ sendFeedback("note"); return; }
  if(t.id==="deal"){ deal(); return; }
  if(t.id==="swap"){ S.side = S.side==="opp"?"my":"opp";   // coach the other side: colors stay fixed, interactivity flips
    S.focus.clear(); S.spyResult=S.checkResult=S.opResult=null; S.spyIdx=0; S.space=null; render(); drawSpace(); return; }
  if(t.id==="edit"){ S.editing=!S.editing; if(S.editing) S.revealMode=false; render(); return; }
  if(t.id==="reveal"){ S.revealMode=!S.revealMode; if(S.revealMode) S.editing=false; render(); return; }
  if(t.id==="gen"){ genClue(); return; }
  if(t.id==="optNext"){ nextOpt(); return; }
  if(t.id==="chk"){ checkClue(); return; }
  if(t.id==="guess"){ guess(); return; }
  const tab=t.closest("#spytabs button"); if(tab){ S.spyTab=tab.dataset.tab; render(); return; }
  const cand=t.closest(".cand[data-act=opt]"); if(cand){ pickOpt(+cand.dataset.i); return; }
  if(t.dataset.act==="cnt"){ S.opCount=Math.max(1,Math.min(9,S.opCount+(+t.dataset.d))); render(); return; }
  if(t.dataset.act==="setrole"){ const w=t.dataset.w, r=t.dataset.r;
    if(S.roles[w]!==r){ S.roles[w]=r; if(r!==S.side) S.focus.delete(w); S.spyResult=null; S.spyIdx=0; S.space=null; render(); drawSpace(); } return; }
  // card body click
  const card=t.closest(".card"); if(card){
    const w=card.dataset.w;
    if(S.revealMode){            // toggle a card as already-exposed (covered)
      S.revealed.has(w)?S.revealed.delete(w):S.revealed.add(w); S.focus.delete(w);
      S.spyResult=S.checkResult=S.opResult=null; S.spyIdx=0; S.space=null; render(); drawSpace(); return;
    }
    if(S.mode==="spymaster" && !S.editing && S.spyTab==="generate" && S.roles[w]===S.side){
      S.focus.has(w)?S.focus.delete(w):S.focus.add(w); S.spyResult=null; S.spyIdx=0; render();   // pick target
    }
  }
});
document.addEventListener("input", e=>{
  const t=e.target;
  if(t.dataset.act==="word"){ const i=+t.dataset.i, old=S.words[i], nv=t.value.trim();
    if(nv && nv!==old && !S.words.some((w,j)=>j!==i&&w===nv)){ S.words[i]=nv; const role=S.roles[old]; delete S.roles[old]; S.roles[nv]=role; if(S.focus.delete(old))S.focus.add(nv); }
    else if(nv!==old){ t.value=old; } }
});
document.addEventListener("change", e=>{
});
document.addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    if(e.target.id==="checkClue") checkClue();
    if(e.target.id==="opClue") guess();
    if(e.target.id==="fbtext") sendFeedback("note");
  }
});
let _rt; window.addEventListener("resize", ()=>{ clearTimeout(_rt); _rt=setTimeout(drawSpace,120); });
try{ if(sessionStorage.getItem("pcg")==="1") document.body.classList.add("pcg-in"); }catch(_){}
boot();
</script>
</body>
</html>
